name: CI — Full Pipeline

on:
  push:
    branches: ['**']
  workflow_dispatch:

jobs:

  # ─── Unit ─────────────────────────────────────────────────────────────────
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Run unit tests
        run: php bin/phpunit --testsuite unit --no-coverage


  # ─── Smoke ────────────────────────────────────────────────────────────────
  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: unit

    services:
      database:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: app
          POSTGRES_USER: app
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432/tcp

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Generate OAuth2 keys
        run: |
          mkdir -p var/oauth
          PASSPHRASE=$(openssl rand -base64 32)
          openssl genrsa -out var/oauth/private.pem -passout pass:$PASSPHRASE 4096
          openssl rsa -pubout -in var/oauth/private.pem -passin pass:$PASSPHRASE -out var/oauth/public.pem
          echo "OAUTH_PASSPHRASE=$PASSPHRASE" >> $GITHUB_ENV

      - name: Setup test database
        run: |
          php bin/console doctrine:database:create --env=test --if-not-exists --no-interaction
          php bin/console doctrine:schema:create --env=test --no-interaction
        env:
          APP_ENV: test
          DATABASE_URL: postgresql://app:test@127.0.0.1:${{ job.services.database.ports['5432'] }}/app

      - name: Run smoke tests
        run: php bin/phpunit --group smoke --no-coverage
        env:
          APP_ENV: test
          DATABASE_URL: postgresql://app:test@127.0.0.1:${{ job.services.database.ports['5432'] }}/app
          OAUTH_PRIVATE_KEY: ${{ github.workspace }}/var/oauth/private.pem
          OAUTH_PUBLIC_KEY: ${{ github.workspace }}/var/oauth/public.pem
          OAUTH_PASSPHRASE: ${{ env.OAUTH_PASSPHRASE }}
          OAUTH_ENCRYPTION_KEY: ${{ secrets.OAUTH_ENCRYPTION_KEY || 'test_encryption_key_32_chars_long' }}


  # ─── Quality ──────────────────────────────────────────────────────────────
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: unit

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-quality-${{ hashFiles('composer.lock') }}
          restore-keys: composer-quality-

      - run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: ECS
        run: vendor/bin/ecs check --no-progress
        continue-on-error: true

      - name: PHPStan
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=-1
        continue-on-error: true


  # ─── Security ─────────────────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: unit

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-audit-${{ hashFiles('composer.lock') }}
          restore-keys: composer-audit-

      - run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Composer audit
        run: composer audit --no-dev
        continue-on-error: true


  # ─── Résumé ───────────────────────────────────────────────────────────────
  summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [unit, smoke, quality, security]
    if: always()

    steps:
      - name: Check results
        run: |
          echo "unit     : ${{ needs.unit.result }}"
          echo "smoke    : ${{ needs.smoke.result }}"
          echo "quality  : ${{ needs.quality.result }}"
          echo "security : ${{ needs.security.result }}"

          if [[ "${{ needs.unit.result }}" == "failure" || "${{ needs.smoke.result }}" == "failure" ]]; then
            echo "❌ Pipeline failed on required jobs."
            exit 1
          fi
          echo "✅ All required jobs passed."
