name: Frontend

on:
  push:
    branches: [main, develop]
    paths: ['frontend/**']
  pull_request:
    paths: ['frontend/**']

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:

  # --- LEVEL 1 : Lint + Typecheck — chaque PR, ~30s ---
  quality:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: pnpm/action-setup@v4
        with:
          version: '10'
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "dir=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.dir }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (Biome)
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck


  # --- LEVEL 2 : Build — vérifie que ça compile ---
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: quality
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: pnpm/action-setup@v4
        with:
          version: '10'
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "dir=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.dir }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build


  # --- LEVEL 3 : E2E smoke — PR uniquement ---
  e2e-smoke:
    name: E2E Smoke (Playwright)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: quality
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: pnpm/action-setup@v4
        with:
          version: '10'
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "dir=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.dir }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Start Nuxt dev server
        run: pnpm dev &
        env:
          NUXT_TELEMETRY_DISABLED: 1

      - name: Wait for Nuxt
        run: npx --yes wait-on http://localhost:3000 --timeout 120000

      - name: Run smoke tests
        run: pnpm test:e2e:smoke

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_number }}
          path: frontend/playwright-report/
          retention-days: 7
