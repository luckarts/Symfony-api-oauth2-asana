services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - .:/app
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_ENV: test
      DATABASE_URL: "mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/app?serverVersion=8.0&charset=utf8mb4"
      MESSENGER_TRANSPORT_DSN: "doctrine://default?auto_setup=0"
      MAILER_DSN: "null://null"
      OAUTH_PRIVATE_KEY: /app/var/oauth/private.pem
      OAUTH_PUBLIC_KEY: /app/var/oauth/public.pem
      OAUTH_PASSPHRASE: ""
      OAUTH_ENCRYPTION_KEY: ${OAUTH_ENCRYPTION_KEY:-test_encryption_key_32_chars_long}
    working_dir: /app

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3308:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
