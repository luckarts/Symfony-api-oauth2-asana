entity: App\Task\Domain\Entity\Task

resources:
    task:
        class: App\Task\Infrastructure\ApiPlatform\Resource\TaskResource
        fields:
            id:
                operations: [read]
            title:
                operations: [read, write]
            status:
                operations: [read, write]
                transform:
                    type: enum
                    class: App\Task\Domain\Enum\TaskStatus
            columnId:
                operations: [read, write]
            parentTaskId:
                operations: [read, write]
            orderIndex:
                operations: [read, write]
            isCompleted:
                operations: [read, write]
            dueDate:
                operations: [read, write]
                transform:
                    type: datetime
                    format: !php/const DateTimeInterface::ATOM
            projectId:
                operations: [read]
            createdAt:
                operations: [read]
                transform:
                    type: datetime
                    format: !php/const DateTimeInterface::ATOM
            updatedAt:
                operations: [read]
                transform:
                    type: datetime
                    format: !php/const DateTimeInterface::ATOM
