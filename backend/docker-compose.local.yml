services:
  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: dev
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app"]
      interval: 5s
      retries: 10

  symfony:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      database:
        condition: service_healthy
    environment:
      APP_ENV: dev
      APP_SECRET: ${APP_SECRET}
      DATABASE_URL: postgresql://app:dev@database:5432/app
      OAUTH_PRIVATE_KEY: ${OAUTH_PRIVATE_KEY}
      OAUTH_PUBLIC_KEY: ${OAUTH_PUBLIC_KEY}
      OAUTH_ENCRYPTION_KEY: ${OAUTH_ENCRYPTION_KEY}
    entrypoint: ["/app/docker/php/entrypoint-local.sh"]
